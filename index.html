<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Undangan HPPD PPM 2027</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

    <style>
        /* Mengatur background halaman agar selalu stabil */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #8fbcae;
            margin: 0;
            font-family: sans-serif;
            overflow: hidden; 
        }

        /* --- STRUKTUR AMPLOP --- */
        .envelope-wrapper {
            position: relative;
            width: 300px;
            height: 200px;
            background-color: #d1bfae; 
            border-radius: 5px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .envelope-wrapper:not(.open):hover {
            transform: translateY(-5px);
        }

        /* --- DESAIN SURAT --- */
        .letter {
            position: absolute;
            
            bottom: 10px;
            left: 50%;
            width: 280px; 
            height: 180px;
            
            transform: translate(-50%, 0) scale(0.8); 
            
            background-image: url('v619-peipei-42-planner.jpg'); 
            background-size: cover;
            background-position: center;
            background-color: #ffffff;
            border-radius: 8px;
            
            opacity: 0;
            z-index: 2; 
            
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
            overflow-y: auto; 
            
            transition: 
                transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1),
                opacity 0.4s ease,
                width 0.6s ease,
                height 0.6s ease,
                top 0.6s ease,
                bottom 0.6s ease,
                z-index 0s 0.2s; 
        }

        /* --- SAAT AMPLOP DIBUKA --- */
        .envelope-wrapper.open .letter {
            opacity: 1;
            
            width: 360px;
            height: 520px;
            
            bottom: auto; 
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(1);
            
            z-index: 10; 
            box-shadow: 0 15px 50px rgba(0,0,0,0.6);
            
            /* Teks diturunkan 10px ke bawah (dari 30px menjadi 40px) */
            padding: 40px 20px 20px 20px;
        }

        /* --- LIPATAN AMPLOP --- */
        .flap {
            position: absolute; top: 0; width: 0; height: 0;
            border-left: 151px solid transparent; border-right: 151px solid transparent; border-top: 100px solid #c4b1a1;
            z-index: 5; transform-origin: top; transition: transform 0.5s ease;
        }
        .envelope-wrapper.open .flap { transform: rotateX(180deg); z-index: 1; }

        .envelope-front { position: absolute; width: 100%; height: 100%; z-index: 4; }
        .envelope-front::before { content: ''; position: absolute; border-top: 101px solid transparent; border-bottom: 101px solid transparent; border-left: 151px solid #e2d1c3; }
        .envelope-front::after { content: ''; position: absolute; right: 0; border-top: 101px solid transparent; border-bottom: 101px solid transparent; border-right: 151px solid #e2d1c3; }

        .envelope-bottom { position: absolute; bottom: 0; width: 0; height: 0; border-left: 151px solid transparent; border-right: 151px solid transparent; border-bottom: 101px solid #d8c5b5; z-index: 4; }

        /* --- TEKS DALAM SURAT --- */
        .letter h2 { margin: 0 0 15px 0; color: #2c2c2c; font-family: 'Dancing Script', cursive; font-size: 2.6rem; }
        .letter p { margin: 0 0 20px 0; color: #1a1a1a; font-family: 'Courier Prime', monospace; font-size: 0.9rem; line-height: 1.6; font-weight: bold; }

        .letter::-webkit-scrollbar { width: 5px; }
        .letter::-webkit-scrollbar-track { background: transparent; }
        .letter::-webkit-scrollbar-thumb { background: #b0c9c1; border-radius: 10px; }

        /* --- TOMBOL --- */
        .button-group { display: flex; flex-direction: column; gap: 10px; align-items: center; }
        .btn { display: inline-block; width: 85%; padding: 10px; text-decoration: none; border-radius: 25px; font-family: 'Courier Prime', monospace; font-weight: bold; font-size: 0.85rem; transition: transform 0.2s; }
        .btn-accept { background-color: #25D366; color: white; box-shadow: 0 4px 10px rgba(37, 211, 102, 0.3); }
        .btn-decline { background-color: #f1f1f1; color: #666; box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1); }
        .btn:hover { transform: scale(1.05); }

        .instruction { position: absolute; bottom: -40px; width: 100%; text-align: center; color: #4a6c61; font-weight: bold; transition: opacity 0.3s ease; }
        .envelope-wrapper.open .instruction { opacity: 0; }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); visibility: hidden; opacity: 0;
            transition: 0.5s; z-index: 9; pointer-events: none;
        }
        .envelope-wrapper.open ~ .overlay { visibility: visible; opacity: 1; }

        /* --- PENYESUAIAN KHUSUS HP --- */
        @media (max-width: 480px) {
            .envelope-wrapper.open .letter {
                width: 88vw; 
                
                /* TINGGI DIKUNCI: Agar tidak terlalu panjang/melar di HP dan proporsional seperti di laptop */
                height: 480px; 
                
                /* Tetap pertahankan teks yang turun 10px */
                padding: 40px 15px 20px 15px; 
            }
            .letter h2 { font-size: 2.4rem; margin-bottom: 12px; } 
            .letter p { font-size: 0.9rem; margin-bottom: 15px; line-height: 1.5; }
            .btn { font-size: 0.8rem; padding: 12px; width: 90%; }
        }

    </style>
</head>
<body>

    <div class="envelope-wrapper" id="envelope">
        
        <div class="letter">
            <h2>Selamat</h2>
            <p>Anda terpilih untuk dapat bergabung kedalam seksi HPPD PPM 2027.<br><br>Saya Jeisen selaku CO HPDD mengundang anda untuk bergabung.<br><br>Apakah anda bersedia?</p>
            
            <div class="button-group">
                <a href="https://wa.me/6289520354150?text=Halo,%20saya%20(nama)%20dengan%20HM%20(2..%200....)%20siap%20bergabung%20menjadi%20anggota%20HPDD%20PPM%202027!" target="_blank" class="btn btn-accept">
                    Saya Bersedia
                </a>
                <a href="https://wa.me/6289520354150?text=Halo,%20saya%20(nama)%20dengan%20HM%20(2..%200....)%20belum%20siap%20bergabung%20menjadi%20anggota%20HPDD%20PPM%202027%20karena%20(alasan)!" target="_blank" class="btn btn-decline">
                    Maaf, Berhalangan
                </a>
            </div>
        </div>

        <div class="flap"></div>
        <div class="envelope-front"></div>
        <div class="envelope-bottom"></div>
        <div class="instruction">Klik amplop untuk membuka</div>
    </div>
    
    <div class="overlay"></div>

    <script>
        const envelope = document.getElementById('envelope');
        envelope.addEventListener('click', (e) => {
            if (!e.target.closest('.btn')) {
                envelope.classList.toggle('open');
            }
        });
    </script>

</body>
</html>
